  <text x="104" y="284" fill="#111827" font-family="Fraunces, Georgia, serif" font-size="68" font-weight="700">Your work history,</text>
  <text x="104" y="354" fill="#111827" font-family="Fraunces, Georgia, serif" font-size="68" font-weight="700">ready to answer.</text>
  <text x="108" y="410" fill="#4B5563" font-family="IBM Plex Sans, Arial, sans-serif" font-size="23" font-weight="500">Document experience, rehearse interviews,</text>
  <text x="108" y="442" fill="#4B5563" font-family="IBM Plex Sans, Arial, sans-serif" font-size="23" font-weight="500">and publish a grounded public profile.</text>

  <g font-family="IBM Plex Mono, ui-monospace, monospace" font-size="16" font-weight="700" letter-spacing=".6">
