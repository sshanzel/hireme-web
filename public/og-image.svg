    <rect x="24" y="28" width="72" height="72" rx="16" fill="#073A5A"/>
    <text x="43" y="74" fill="#FAF4E8" font-family="IBM Plex Sans, Arial, sans-serif" font-size="28" font-weight="700">LH</text>
    <text x="116" y="55" fill="#111827" font-family="Fraunces, Georgia, serif" font-size="26" font-weight="700">Public profile</text>
    <text x="116" y="83" fill="#4B5563" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">Ask about real work</text>
    <line x1="24" y1="124" x2="252" y2="124" stroke="#D8CCB7"/>
    <rect x="24" y="154" width="228" height="54" rx="12" fill="#F6F0E3" stroke="#D8CCB7"/>
    <text x="42" y="187" fill="#111827" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17" font-weight="700">What did you build?</text>
