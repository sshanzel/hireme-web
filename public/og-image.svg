    <rect x="348" y="488" width="196" height="44" rx="10" fill="#EFE6D5" stroke="#D8CCB7"/>
    <text x="370" y="516" fill="#073A5A">RAG COACHING</text>
    <rect x="562" y="488" width="216" height="44" rx="10" fill="#EFE6D5" stroke="#D8CCB7"/>
    <text x="584" y="516" fill="#073A5A">PUBLIC BIO CHAT</text>
  </g>

  <g transform="translate(800 118)">
