    <text x="42" y="257" fill="#FAF4E8" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17" font-weight="700">Grounded answer...</text>
    <rect x="24" y="304" width="228" height="28" rx="8" fill="#EFE6D5"/>
